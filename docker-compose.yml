services:
  postgres:
    image: postgres:17-alpine
    container_name: dream-library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notula
      POSTGRES_PASSWORD: notula
      POSTGRES_DB: notula
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notula -d notula']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dream-library-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://notula:notula@postgres:5432/notula
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 4000
      CORS_ORIGINS: http://localhost
    ports:
      - '4000:4000'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: dream-library-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  postgres-data:
