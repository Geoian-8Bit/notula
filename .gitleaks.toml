title = "Dream Library gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Files allowed to mention secret-like patterns"
paths = [
  '''\.env\.example$''',
  '''SECURITY\.md$''',
  '''README\.md$''',
  '''src/backend/src/test/setup\.ts$''',
  '''\.github/workflows/.*\.ya?ml$''',
]
